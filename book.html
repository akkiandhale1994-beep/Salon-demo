<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenQ — Book a Visit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<header>
  <div class="brand-row">
    <div>
      <div class="brand-name" id="salonNameDisplay">Loading...</div>
      <div class="brand-tag">Book Your Visit</div>
    </div>
    <div class="header-meta" id="headerDate"></div>
  </div>
</header>

<main id="app"></main>
<div class="toast" id="toast"></div>

<script src="shared-multi.js"></script>
<script>
let client = null; // {name, phone}
let selectedServices = [];
let selectedStaff = 'any';
let selectedDate = null;
let selectedSlot = null;
let activeTab = 'book';
let showDatePicker = false;
let addServiceOpen = false;
let salonId = null;

function clientStorageKey(){ return 'tokenq-client-' + salonId; }
function loadClient(){
  try{
    const raw = localStorage.getItem(clientStorageKey());
    if(raw) client = JSON.parse(raw);
  }catch(e){}
}
function saveClient(name, phone){
  client = { name, phone };
  try{ localStorage.setItem(clientStorageKey(), JSON.stringify(client)); }catch(e){}
}
function switchAccount(){
  client = null;
  try{ localStorage.removeItem(clientStorageKey()); }catch(e){}
  render();
}

function renderLogin(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="li-title">Welcome</div>
        <div class="li-sub">Enter your details to book a visit at ${escapeHtml(DATA.settings.salonName)}</div>
        <div class="field" style="text-align:left"><label class="field-label">Your Name</label>
          <input type="text" id="loginName" placeholder="Full name"></div>
        <div class="field" style="text-align:left"><label class="field-label">Mobile Number</label>
          <input type="tel" id="loginPhone" placeholder="10-digit mobile number"></div>
        <button class="btn-primary" onclick="doLogin()">Continue</button>
      </div>
    </div>
  `;
}
function doLogin(){
  const name = document.getElementById('loginName').value.trim();
  const phone = document.getElementById('loginPhone').value.trim();
  if(!name || phone.length < 10){ showToast('Please enter a valid name and mobile number'); return; }
  saveClient(name, phone);
  render();
}

function setTab(t){ activeTab=t; addServiceOpen=false; render(); }

function paymentLink(b){
  if(!DATA.settings.upiId) return '';
  return `upi://pay?pa=${encodeURIComponent(DATA.settings.upiId)}&pn=${encodeURIComponent(DATA.settings.salonName)}&am=${b.amount}&cu=INR&tn=${encodeURIComponent('Token '+b.token)}`;
}
function renderQRBox(elId, link){
  const box=document.getElementById(elId);
  if(!box) return;
  box.innerHTML='';
  try{ new QRCode(box, { text: link, width: 150, height: 150, colorDark:'#0F3D3E', colorLight:'#ffffff' }); }
  catch(e){ box.textContent='QR unavailable.'; }
}

function renderTrackingCard(b){
  const badgeCls = b.paymentPending ? 'waiting' : (b.status==='in-progress' ? 'inprogress' : 'waiting');
  const badgeText = b.paymentPending ? 'PAYMENT PENDING' : (b.status==='in-progress' ? 'IN CHAIR' : 'WAITING');
  let timerHTML='';
  if(b.status==='in-progress' && !b.paymentPending){
    const dur=bookingSvcDuration(b);
    timerHTML=`<div class="tc-timer" data-started="${b.startedAt}">--:--</div>
      <div style="font-size:11px;color:var(--gold-light);opacity:.8">estimated ${dur} min service</div>`;
  }
  const svcRows = b.services.map(id=>{
    const s=svcById(id);
    return `<div class="tc-svc-row"><span>${escapeHtml(s?.name||id)}</span><span>${fmtMoney(s?.price||0)}</span></div>`;
  }).join('');
  const total = bookingSvcTotal(b);

  let paymentHTML = '';
  if(b.paymentPending){
    paymentHTML = `<div style="text-align:center;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.15)">
      <div style="color:var(--gold-light);font-size:13px;margin-bottom:8px">Scan to pay ${fmtMoney(b.pendingAmount)}</div>
      <div id="clientQR-${b.id}" style="display:inline-block;background:#fff;padding:8px;border-radius:10px"></div>
      <div style="font-size:11px;color:var(--gold-light);opacity:.8;margin-top:8px">Or ask the salon to show their QR — either works</div>
    </div>`;
  }

  const canAddService = (b.status==='waiting' || b.status==='in-progress') && !b.paymentPending;
  const availableToAdd = DATA.settings.services.filter(s=>!b.services.includes(s.id));
  let addSvcHTML = '';
  if(canAddService){
    if(addServiceOpen){
      const opts = availableToAdd.map(s=>`
        <div class="service-card" onclick="addServiceToActive('${b.id}','${s.id}')">
          <div class="s-name">${escapeHtml(s.name)}</div>
          <div class="s-meta"><span>${fmtMoney(s.price)}</span><span>${s.duration} min</span></div>
        </div>`).join('');
      addSvcHTML = `<div class="add-service-panel"><div class="service-grid">${opts || '<div style="color:var(--cream);font-size:12.5px;opacity:.8">All services already added</div>'}</div>
        <button class="add-service-toggle" style="width:100%;margin-top:8px" onclick="addServiceOpen=false;render()">Close</button></div>`;
    }else{
      addSvcHTML = `<div class="add-service-toggle" onclick="addServiceOpen=true;render()">+ Add another service to this visit</div>`;
    }
  }

  return `
    <div class="tracking-card">
      <div class="tc-token">Your Token</div>
      <div class="tc-num">#${String(b.token).padStart(3,'0')}</div>
      <span class="tc-badge ${badgeCls}">${badgeText}</span>
      <div style="margin-top:6px;font-size:12.5px;color:var(--gold-light)">with ${escapeHtml(staffName(b.assignedStaffId||b.staffId))}</div>
      ${timerHTML}
      <div class="tc-services">
        ${svcRows}
        <div class="tc-total"><span>Total</span><span class="tc-amount-due">${fmtMoney(total)}</span></div>
      </div>
      ${paymentHTML}
      ${addSvcHTML}
    </div>`;
}

function liveStatusBanner(){
  return DATA.settings.staff.map(s=>{
    const st = staffLiveStatus(s.id);
    if(st.busy){
      const elapsedMin = Math.floor((Date.now()-st.booking.startedAt)/60000);
      const remaining = Math.max(st.duration-elapsedMin,1);
      return `<div class="queue-banner" style="margin-bottom:8px">
        <div class="qb-left"><span class="qb-dot"></span>
          <div><div class="qb-title">${escapeHtml(s.name)} — serving ${escapeHtml(st.booking.name)}</div>
          <div class="qb-sub">Started ${elapsedMin} min ago</div></div></div>
        <div style="text-align:right"><div class="qb-eta">~${remaining} min</div><div class="qb-sub">left</div></div>
      </div>`;
    }else{
      return `<div class="queue-banner" style="margin-bottom:8px;background:var(--green-bg)">
        <div class="qb-left"><span class="qb-dot idle"></span>
          <div><div class="qb-title" style="color:var(--green)">${escapeHtml(s.name)} — free now</div>
          <div class="qb-sub" style="color:var(--green)">${st.waitingCount} waiting</div></div></div>
      </div>`;
    }
  }).join('');
}

function renderBookFlow(){
  const dateStr = selectedDate || todayStr();
  const isToday = dateStr === todayStr();

  const svcHTML = DATA.settings.services.map(s=>`
    <div class="service-card ${selectedServices.includes(s.id)?'selected':''}" onclick="toggleService('${s.id}')">
      <div class="s-check"></div>
      <div class="s-name">${escapeHtml(s.name)}</div>
      <div class="s-meta"><span>${fmtMoney(s.price)}</span><span>${s.duration} min</span></div>
    </div>`).join('');

  const staffChips = ['any', ...DATA.settings.staff.map(s=>s.id)].map(id=>{
    const label = id==='any' ? 'Any Available' : staffName(id);
    return `<div class="chip ${selectedStaff===id?'selected':''}" onclick="selectStaff('${id}')">${escapeHtml(label)}</div>`;
  }).join('');

  let waitHTML = '';
  if(isToday && selectedServices.length){
    const eta = estimateWaitMinutes(selectedStaff);
    waitHTML = `<div class="footer-note" style="margin-top:6px;text-align:left">Estimated wait if you book "Now" with ${selectedStaff==='any'?'any available staff':escapeHtml(staffName(selectedStaff))}: <b style="color:var(--teal)">~${eta} min</b></div>`;
  }

  const tmr = tomorrowStr();
  const dateHTML = `
    <div class="date-seg">
      <button class="date-seg-btn ${dateStr===todayStr()?'active':''}" onclick="selectDate('${todayStr()}')">Today</button>
      <button class="date-seg-btn ${dateStr===tmr?'active':''}" onclick="selectDate('${tmr}')">Tomorrow</button>
      <button class="date-seg-btn calendar ${(dateStr!==todayStr()&&dateStr!==tmr)?'active':''}" onclick="toggleDatePicker()">📅 ${(dateStr!==todayStr()&&dateStr!==tmr)?fmtDateLabel(dateStr):'Pick date'}</button>
    </div>
    ${showDatePicker? `<div class="date-picker-popover"><input type="date" value="${dateStr}" min="${todayStr()}" onchange="selectDate(this.value)"></div>` : ''}`;

  const slots = buildSlots(dateStr, selectedStaff);
  const slotHTML = slots.map(s=>`
    <div class="slot-btn ${s.now?'now':''} ${selectedSlot===s.key?'selected':''} ${s.taken?'taken':''}"
         onclick="${s.taken?'':`selectSlot('${s.key}')`}">${s.label}</div>`).join('');

  const total = selectedServices.reduce((sum,id)=>sum+(svcById(id)?.price||0),0);

  return `
    ${isToday? `<div class="section-label">Live Status</div>${liveStatusBanner()}` : ''}

    <div class="section-label">1 · Choose Service(s)</div>
    <div class="service-grid">${svcHTML}</div>

    <div class="section-label">2 · Preferred Staff</div>
    <div class="chip-row">${staffChips}</div>

    <div class="section-label">3 · Choose Date</div>
    ${dateHTML}

    <div class="section-label">4 · Choose a Time</div>
    <div class="slot-grid">${slotHTML}</div>
    ${waitHTML}

    <div class="total-row"><span>Total</span><span class="amt">${fmtMoney(total)}</span></div>
    <button class="btn-primary" id="confirmBtn" onclick="confirmBooking()"
      ${(selectedServices.length&&selectedSlot)?'':'disabled'}>Confirm Booking</button>
  `;
}

function renderMainView(){
  const app = document.getElementById('app');
  const active = activeBookingForPhone(client.phone);

  const tabsHTML = `<div class="tab-nav">
    <div class="tab-nav-btn ${activeTab==='book'?'active':''}" onclick="setTab('book')">${active?'Track Visit':'Book a Visit'}</div>
    <div class="tab-nav-btn ${activeTab==='history'?'active':''}" onclick="setTab('history')">My History</div>
  </div>`;

  let bodyHTML = '';
  if(activeTab==='history'){
    const hist = historyForPhone(client.phone);
    bodyHTML = hist.length ? hist.map(b=>`
      <div class="history-item">
        <div class="hi-left"><div class="hi-date">${fmtDateLabel(b.date)} · Token #${String(b.token).padStart(3,'0')}</div>
        <div class="hi-svc">${bookingSvcNames(b)}</div></div>
        <div class="hi-right"><div class="hi-amount">${fmtMoney(b.amount)}</div>
        <div class="hi-method">${escapeHtml(b.paymentMethod||'—')}</div></div>
      </div>`).join('') : `<div class="empty-note">No past visits yet.</div>`;
  }else{
    if(active){
      bodyHTML = renderTrackingCard(active);
      bodyHTML += `<div class="footer-note">Your queue position updates automatically — no need to refresh.</div>`;
    }else{
      bodyHTML = renderBookFlow();
    }
  }

  app.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="section-label" style="margin:0">Hi, ${escapeHtml(client.name)}</div>
      <button class="header-link" style="border-color:var(--teal);color:var(--teal)" onclick="switchAccount()">Not you?</button>
    </div>
    ${tabsHTML}
    ${bodyHTML}
  `;
  if(activeTab==='book' && active && active.paymentPending){
    const link = paymentLink({...active, amount: active.pendingAmount});
    renderQRBox('clientQR-'+active.id, link);
  }
  startTrackingTimer();
}

function toggleService(id){
  if(selectedServices.includes(id)) selectedServices=selectedServices.filter(x=>x!==id);
  else selectedServices.push(id);
  render();
}
function selectStaff(id){ selectedStaff=id; selectedSlot=null; render(); }
function toggleDatePicker(){ showDatePicker=!showDatePicker; render(); }
function selectDate(d){ if(!d) return; selectedDate=d; selectedSlot=null; showDatePicker=false; render(); }
function selectSlot(key){ selectedSlot=key; render(); }

async function confirmBooking(){
  const dateStr = selectedDate || todayStr();
  const tb = bookingsForDate(dateStr);
  const token = tb.length ? Math.max(...tb.map(b=>b.token))+1 : 1;
  const booking={
    id:'b'+Date.now(), token, name:client.name, phone:client.phone, services:[...selectedServices],
    date:dateStr, slot:selectedSlot, staffId:selectedStaff, assignedStaffId: selectedStaff!=='any'?selectedStaff:null,
    status:'waiting', createdAt:Date.now(), startedAt:null, completedAt:null, amount:null, paymentMethod:null
  };
  await writeBooking(booking);
  selectedServices=[]; selectedSlot=null; selectedStaff='any'; selectedDate=null;
  showToast('Booking confirmed — Token #'+token);
  render();
}

async function addServiceToActive(bookingId, svcId){
  const b = DATA.bookings.find(x=>x.id===bookingId);
  if(!b) return;
  if(!b.services.includes(svcId)) b.services.push(svcId);
  await writeBooking(b);
  addServiceOpen=false;
  showToast('Service added');
  render();
}

function startTrackingTimer(){
  setInterval(()=>{
    document.querySelectorAll('.tc-timer').forEach(el=>{
      const started=parseInt(el.dataset.started,10);
      const elapsedSec=Math.floor((Date.now()-started)/1000);
      const m=Math.floor(elapsedSec/60), s=elapsedSec%60;
      el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} elapsed`;
    });
  },1000);
}

function render(){
  document.getElementById('headerDate').textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  if(!client){ renderLogin(); } else { renderMainView(); }
}

function renderInvalidSalon(){
  document.getElementById('app').innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--muted,#8a8578)">
    ⚠️ This booking link is invalid or the salon no longer exists.
  </div>`;
  document.getElementById('salonNameDisplay').textContent = 'TokenQ';
}

salonId = getSalonIdFromURL();
if(!salonId){
  renderInvalidSalon();
}else{
  initFirebaseForSalon(salonId, function onData(){
    document.getElementById('salonNameDisplay').textContent=DATA.settings.salonName;
    loadClient();
    render();
  }, function onMissing(){
    renderInvalidSalon();
  });
}
</script>
</body>
</html>
