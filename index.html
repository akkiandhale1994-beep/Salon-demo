<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenQ — Book a Visit</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0F3D3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TokenQ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>

<div id="installBanner" style="display:none;background:var(--gold);color:var(--ink);padding:10px 16px;text-align:center;font-size:12.5px;font-weight:600;cursor:pointer;" onclick="handleInstallClick()">
  📲 Add TokenQ to your home screen — tap here
</div>

<header>
  <div class="brand-row">
    <div>
      <div class="brand-name" id="salonNameDisplay">Style Studio</div>
      <div class="brand-tag">Book Your Visit</div>
    </div>
    <div class="header-meta" id="headerDate"></div>
  </div>
</header>

<main id="app"></main>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
let client = null; // {name, phone}
let selectedServices = [];
let selectedStaff = 'any';
let selectedDate = null;
let selectedSlot = null;
let salonId = null;
let showAddServicePanel = false;

function clientKey(){ return 'tokenq-client-'+salonId; }
function lastBookingKey(){ return 'tokenq-lastbooking-'+salonId; }

function loadClient(){
  try{
    const raw = localStorage.getItem(clientKey());
    if(raw) client = JSON.parse(raw);
  }catch(e){}
}
function saveClient(name, phone){
  client = { name, phone };
  try{ localStorage.setItem(clientKey(), JSON.stringify(client)); }catch(e){}
}
function switchAccount(){
  client = null;
  try{ localStorage.removeItem(clientKey()); localStorage.removeItem(lastBookingKey()); }catch(e){}
  render();
}
function getLastBookingId(){ try{ return localStorage.getItem(lastBookingKey()); }catch(e){ return null; } }
function setLastBookingId(id){ try{ localStorage.setItem(lastBookingKey(), id); }catch(e){} }
function clearLastBookingId(){ try{ localStorage.removeItem(lastBookingKey()); }catch(e){} }

function renderInvalidLink(){
  document.getElementById('app').innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="li-title">Invalid Booking Link</div>
        <div class="li-sub">This link is missing salon information. Please ask your salon for their correct booking link or scan their QR code.</div>
      </div>
    </div>`;
}

function renderLogin(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="li-title">Welcome</div>
        <div class="li-sub">Enter your details to book a visit at ${escapeHtml(DATA.settings.salonName)}</div>
        <div class="field" style="text-align:left"><label class="field-label">Your Name</label>
          <input type="text" id="loginName" placeholder="Full name"></div>
        <div class="field" style="text-align:left"><label class="field-label">Mobile Number</label>
          <input type="tel" id="loginPhone" placeholder="10-digit mobile number"></div>
        <button class="btn-primary" onclick="doLogin()">Continue</button>
      </div>
    </div>
  `;
}
function doLogin(){
  const name = document.getElementById('loginName').value.trim();
  const phone = document.getElementById('loginPhone').value.trim();
  if(!name || phone.length < 10){ showToast('Please enter a valid name and mobile number'); return; }
  saveClient(name, phone);
  render();
}

function renderBookView(){
  const app = document.getElementById('app');
  const dateStr = selectedDate || todayStr();

  let bannerHTML = '';
  const isToday = dateStr === todayStr();
  if(isToday){
    bannerHTML = DATA.settings.staff.map(s=>{
      const st = staffLiveStatus(s.id);
      if(st.busy){
        const elapsedMin = Math.floor((Date.now()-st.booking.startedAt)/60000);
        const remaining = Math.max(st.duration-elapsedMin,1);
        return `<div class="queue-banner" style="margin-bottom:8px">
          <div class="qb-left"><span class="qb-dot"></span>
            <div><div class="qb-title">${escapeHtml(s.name)} — serving ${escapeHtml(st.booking.name)}</div>
            <div class="qb-sub">Started ${elapsedMin} min ago</div></div></div>
          <div style="text-align:right"><div class="qb-eta">~${remaining} min</div><div class="qb-sub">left</div></div>
        </div>`;
      }else{
        return `<div class="queue-banner" style="margin-bottom:8px;background:var(--green-bg)">
          <div class="qb-left"><span class="qb-dot idle"></span>
            <div><div class="qb-title" style="color:var(--green)">${escapeHtml(s.name)} — free now</div>
            <div class="qb-sub" style="color:var(--green)">${st.waitingCount} waiting</div></div></div>
        </div>`;
      }
    }).join('');
  }

  const svcHTML = DATA.settings.services.map(s=>`
    <div class="service-card ${selectedServices.includes(s.id)?'selected':''}" onclick="toggleService('${s.id}')">
      <div class="s-check"></div>
      <div class="s-name">${escapeHtml(s.name)}</div>
      <div class="s-meta"><span>${fmtMoney(s.price)}</span><span>${s.duration} min</span></div>
    </div>`).join('');

  const staffChips = ['any', ...DATA.settings.staff.map(s=>s.id)].map(id=>{
    const label = id==='any' ? 'Any Available' : staffName(id);
    return `<div class="chip ${selectedStaff===id?'selected':''}" onclick="selectStaff('${id}')">${escapeHtml(label)}</div>`;
  }).join('');

  let waitHTML = '';
  if(isToday && selectedServices.length){
    const eta = estimateWaitMinutes(selectedStaff);
    waitHTML = `<div class="footer-note" style="margin-top:6px;text-align:left">Estimated wait if you book "Now" with ${selectedStaff==='any'?'any available staff':escapeHtml(staffName(selectedStaff))}: <b style="color:var(--teal)">~${eta} min</b></div>`;
  }

  const tmr = tomorrowStr();
  const dateHTML = `
    <div class="date-row">
      <div class="date-chip ${dateStr===todayStr()?'selected':''}" onclick="selectDate('${todayStr()}')">Today</div>
      <div class="date-chip ${dateStr===tmr?'selected':''}" onclick="selectDate('${tmr}')">Tomorrow</div>
      <input type="date" id="customDate" value="${dateStr!==todayStr()&&dateStr!==tmr?dateStr:''}" min="${todayStr()}" onchange="selectDate(this.value)">
    </div>`;

  const slots = buildSlots(dateStr, selectedStaff);
  const slotHTML = slots.map(s=>`
    <div class="slot-btn ${s.now?'now':''} ${selectedSlot===s.key?'selected':''} ${s.taken?'taken':''}"
         onclick="${s.taken?'':`selectSlot('${s.key}')`}">${s.label}</div>`).join('');

  const total = selectedServices.reduce((sum,id)=>sum+(svcById(id)?.price||0),0);

  app.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="section-label" style="margin:0">Hi, ${escapeHtml(client.name)}</div>
      <button class="header-link" style="border-color:var(--teal);color:var(--teal)" onclick="switchAccount()">Not you?</button>
    </div>

    ${isToday? `<div class="section-label">Live Status</div>${bannerHTML}` : ''}

    <div class="section-label">1 · Choose Service(s)</div>
    <div class="service-grid">${svcHTML}</div>

    <div class="section-label">2 · Preferred Staff</div>
    <div class="chip-row">${staffChips}</div>

    <div class="section-label">3 · Choose Date</div>
    ${dateHTML}

    <div class="section-label">4 · Choose a Time</div>
    <div class="slot-grid">${slotHTML}</div>
    ${waitHTML}

    <div class="total-row"><span>Total</span><span class="amt">${fmtMoney(total)}</span></div>
    <button class="btn-primary" id="confirmBtn" onclick="confirmBooking()"
      ${(selectedServices.length&&selectedSlot)?'':'disabled'}>Confirm Booking</button>

    <div class="footer-note">Powered by TokenQ</div>
  `;
}

function toggleService(id){
  if(selectedServices.includes(id)) selectedServices=selectedServices.filter(x=>x!==id);
  else selectedServices.push(id);
  render();
}
function selectStaff(id){ selectedStaff=id; selectedSlot=null; render(); }
function selectDate(d){ if(!d) return; selectedDate=d; selectedSlot=null; render(); }
function selectSlot(key){ selectedSlot=key; render(); }

async function confirmBooking(){
  const dateStr = selectedDate || todayStr();
  const tb = bookingsForDate(dateStr);
  const token = tb.length ? Math.max(...tb.map(b=>b.token))+1 : 1;
  const booking={
    id:'b'+Date.now(), token, name:client.name, phone:client.phone, services:[...selectedServices],
    date:dateStr, slot:selectedSlot, staffId:selectedStaff, assignedStaffId: selectedStaff!=='any'?selectedStaff:null,
    status:'waiting', createdAt:Date.now(), startedAt:null, amount:null
  };
  DATA.bookings.push(booking);
  await saveData();
  setLastBookingId(booking.id);
  selectedServices=[]; selectedSlot=null; selectedStaff='any'; selectedDate=null; showAddServicePanel=false;
  render();
}

function renderTracking(b){
  const app=document.getElementById('app');
  const statusInfo = b.status==='waiting'
    ? { label:'WAITING', cls:'waiting', sub: 'You are in the queue. We\'ll notify you when it\'s your turn.' }
    : { label:'IN CHAIR', cls:'inprogress', sub: 'Your service is in progress right now.' };

  let timerHTML='';
  if(b.status==='in-progress'){
    const dur=bookingSvcDuration(b);
    timerHTML=`<div class="bt-timer" data-started="${b.startedAt}" data-dur="${dur}" style="margin:10px 0">--:--</div>`;
  }

  let etaHTML='';
  if(b.status==='waiting' && b.date===todayStr()){
    const eta = estimateWaitMinutes(b.assignedStaffId||b.staffId||'any');
    etaHTML = `<div class="footer-note" style="text-align:left">Estimated wait: <b style="color:var(--teal)">~${eta} min</b></div>`;
  }

  const availableToAdd = DATA.settings.services.filter(s=>!b.services.includes(s.id));
  const addPanel = showAddServicePanel ? `
    <div class="settings-card" style="margin-top:10px">
      <div class="field-label" style="margin-bottom:8px">Add a service to this visit</div>
      ${availableToAdd.length ? availableToAdd.map(s=>`
        <div class="service-card" style="margin-bottom:8px" onclick="clientAddService('${b.id}','${s.id}')">
          <div class="s-name">${escapeHtml(s.name)}</div>
          <div class="s-meta"><span>${fmtMoney(s.price)}</span><span>${s.duration} min</span></div>
        </div>`).join('') : `<div class="empty-note">All services already added.</div>`}
      <button class="btn-secondary" style="width:100%" onclick="showAddServicePanel=false;render()">Close</button>
    </div>` : '';

  const waMsg=encodeURIComponent(
    `Hi ${DATA.settings.salonName}, I've booked a slot.\nToken #${b.token}\nName: ${b.name}\nService: ${bookingSvcNames(b)}\nStaff: ${staffName(b.staffId)}\nDate: ${fmtDateLabel(b.date)}\nTime: ${slotLabel(b.slot,b.date)}\nTotal: ${fmtMoney(bookingSvcTotal(b))}`
  );
  const waLink=`https://wa.me/${DATA.settings.ownerWhatsapp}?text=${waMsg}`;

  app.innerHTML=`
    <div class="section-label">Your Booking</div>
    <div class="ticket">
      <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">Your Token</div>
      <div class="ticket-token">#${String(b.token).padStart(3,'0')}</div>
      <div style="margin:10px 0"><span class="badge ${statusInfo.cls}">${statusInfo.label}</span></div>
      <div class="footer-note" style="margin-bottom:6px">${statusInfo.sub}</div>
      ${timerHTML}
      <hr class="ticket-divider">
      <div class="ticket-row"><span>Name</span><b>${escapeHtml(b.name)}</b></div>
      <div class="ticket-row"><span>Service(s)</span><b>${bookingSvcNames(b)}</b></div>
      <div class="ticket-row"><span>Staff</span><b>${escapeHtml(staffName(b.assignedStaffId||b.staffId))}</b></div>
      <div class="ticket-row"><span>Date</span><b>${fmtDateLabel(b.date)}</b></div>
      <div class="ticket-row"><span>Time</span><b>${slotLabel(b.slot,b.date)}</b></div>
      <div class="ticket-row"><span>Running Total</span><b>${fmtMoney(bookingSvcTotal(b))}</b></div>
    </div>
    ${etaHTML}
    <button class="btn-secondary" style="width:100%;margin-top:10px" onclick="showAddServicePanel=true;render()">+ Add Another Service</button>
    ${addPanel}
    <div style="margin-top:16px;text-align:center">
      <a class="btn-wa" href="${waLink}" target="_blank">📲 Notify Salon on WhatsApp</a>
    </div>
    <div style="text-align:center;margin-top:14px">
      <button class="header-link" onclick="startOver()">This isn't my booking / Start over</button>
    </div>
  `;
  startClientTimer();
}

async function clientAddService(bookingId, serviceId){
  addServiceToBooking(bookingId, serviceId);
  await saveData();
  showAddServicePanel=false;
  render();
  showToast('Service added');
}

function renderReceipt(b){
  const app=document.getElementById('app');
  const link = paymentLink(b);
  app.innerHTML=`
    <div class="section-label">Visit Complete</div>
    <div class="ticket">
      <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">Token</div>
      <div class="ticket-token">#${String(b.token).padStart(3,'0')}</div>
      <div style="margin:10px 0"><span class="badge done">PAID</span></div>
      <hr class="ticket-divider">
      <div class="ticket-row"><span>Name</span><b>${escapeHtml(b.name)}</b></div>
      <div class="ticket-row"><span>Service(s)</span><b>${bookingSvcNames(b)}</b></div>
      <div class="ticket-row"><span>Staff</span><b>${escapeHtml(staffName(b.assignedStaffId||b.staffId))}</b></div>
      <div class="ticket-row"><span>Amount</span><b style="font-size:18px;color:var(--teal)">${fmtMoney(b.amount)}</b></div>
    </div>
    ${link ? `<div style="margin-top:16px;text-align:center"><a class="btn-wa" href="${link}">💳 Pay via UPI</a></div>` : ''}
    <button class="btn-primary" style="width:100%;margin-top:16px" onclick="startOver()">Book Another Visit</button>
    <div class="footer-note">Thank you for visiting ${escapeHtml(DATA.settings.salonName)}!</div>
  `;
}

function startOver(){
  clearLastBookingId();
  showAddServicePanel=false;
  render();
}

function startClientTimer(){
  const el = document.querySelector('.bt-timer');
  if(!el) return;
  if(window._clientTimerInt) clearInterval(window._clientTimerInt);
  window._clientTimerInt = setInterval(()=>{
    const started=parseInt(el.dataset.started,10);
    const elapsedSec=Math.floor((Date.now()-started)/1000);
    const m=Math.floor(elapsedSec/60), s=elapsedSec%60;
    el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },1000);
}

function render(){
  document.getElementById('headerDate').textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  if(!client){ renderLogin(); return; }
  const lastId = getLastBookingId();
  if(lastId){
    const b = DATA.bookings.find(x=>x.id===lastId);
    if(b && b.status==='done'){ renderReceipt(b); return; }
    if(b){ renderTracking(b); return; }
    clearLastBookingId();
  }
  renderBookView();
}

(async function init(){
  salonId = getSalonIdFromURL();
  if(!salonId){ renderInvalidLink(); return; }
  setSalonId(salonId);
  await loadData();
  loadClient();
  document.getElementById('salonNameDisplay').textContent=DATA.settings.salonName;
  render();
  startRealtimeSync(()=>{
    document.getElementById('salonNameDisplay').textContent=DATA.settings.salonName;
    if(client){ render(); }
  });
})();

// ---------- PWA install ----------
let deferredPrompt=null;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault(); deferredPrompt=e;
  if(!isStandalone) document.getElementById('installBanner').style.display='block';
});
function handleInstallClick(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.finally(()=>{ deferredPrompt=null; document.getElementById('installBanner').style.display='none'; });
  }else if(isIOS){ showToast('Tap Share ⬆️ then "Add to Home Screen"'); }
}
if(isIOS && !isStandalone){
  document.getElementById('installBanner').style.display='block';
  document.getElementById('installBanner').textContent='📲 Tap Share, then "Add to Home Screen"';
}
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
</body>
</html>
