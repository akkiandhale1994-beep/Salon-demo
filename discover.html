<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenQ — Find Salons Near You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  body{ background:var(--cream,#F4F1EA); min-height:100vh; }
  .disc-header{ background:var(--teal,#0F3D3E); color:#fff; padding:24px 20px 20px; }
  .disc-title{ font-family:'Fraunces',serif; font-size:24px; font-weight:700; }
  .disc-sub{ font-size:12.5px; color:var(--gold,#C99A3C); margin-top:2px; letter-spacing:0.5px; }
  .disc-search{ margin-top:16px; }
  .disc-search input{ width:100%; padding:12px 14px; border-radius:10px; border:none; font-family:'Work Sans'; font-size:14px; box-sizing:border-box; }
  .disc-cats{ display:flex; gap:8px; overflow-x:auto; padding:16px 20px 4px; }
  .disc-cat{ flex:0 0 auto; padding:8px 16px; border-radius:20px; background:#fff; border:1.5px solid #e5e1d6; font-size:12.5px; font-weight:600; color:#5a5648; cursor:pointer; white-space:nowrap; }
  .disc-cat.active{ background:var(--teal,#0F3D3E); border-color:var(--teal,#0F3D3E); color:#fff; }
  .disc-list{ padding:12px 20px 40px; }
  .salon-card{ background:#fff; border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:0 2px 12px rgba(0,0,0,0.06); cursor:pointer; display:flex; gap:14px; align-items:center; transition:transform .15s ease; }
  .salon-card:active{ transform:scale(0.98); }
  .salon-avatar{ width:52px; height:52px; border-radius:12px; background:linear-gradient(135deg,var(--teal,#0F3D3E),var(--gold,#C99A3C)); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-size:20px; font-weight:700; flex-shrink:0; }
  .salon-info{ flex:1; min-width:0; }
  .salon-name{ font-family:'Fraunces',serif; font-size:16.5px; font-weight:600; color:var(--ink,#1a1a1a); }
  .salon-cat{ font-size:11.5px; color:var(--gold,#C99A3C); font-weight:600; margin-top:1px; }
  .salon-loc{ font-size:12px; color:#8a8578; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .salon-arrow{ color:#c9c4b5; font-size:18px; }
  .disc-empty{ text-align:center; padding:60px 20px; color:#8a8578; }
  .disc-empty .big{ font-size:40px; margin-bottom:10px; }
  .disc-loading{ text-align:center; padding:60px 20px; color:#8a8578; font-size:13px; }
</style>
</head>
<body>

<div class="disc-header">
  <div class="disc-title">Find Your Salon</div>
  <div class="disc-sub">BOOK A VISIT IN SECONDS</div>
  <div class="disc-search">
    <input type="text" id="searchBox" placeholder="Search salon name or area..." oninput="applyFilters()">
  </div>
</div>

<div class="disc-cats" id="catRow"></div>
<div class="disc-list" id="listRoot"><div class="disc-loading">Loading salons...</div></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB084EcLFVtZymBMRx7J0TKUdKaeWpQs8o",
  authDomain: "tokenq-salon.firebaseapp.com",
  databaseURL: "https://tokenq-salon-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tokenq-salon",
  storageBucket: "tokenq-salon.firebasestorage.app",
  messagingSenderId: "584313999476",
  appId: "1:584313999476:web:7457c6e4fa2e98eeecc121"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allSalons = [];
let activeCat = 'All';
let searchTerm = '';

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function initials(name){
  return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
}
function avgRating(s){
  const reviews = s.reviews ? Object.values(s.reviews) : [];
  if(!reviews.length) return null;
  const avg = reviews.reduce((sum,r)=>sum+(r.rating||0),0)/reviews.length;
  return { avg: avg.toFixed(1), count: reviews.length };
}

function renderCategoryRow(){
  const cats = ['All', ...new Set(allSalons.map(s=>s.category).filter(Boolean))];
  const row = document.getElementById('catRow');
  row.innerHTML = cats.map(c=>`
    <div class="disc-cat ${activeCat===c?'active':''}" onclick="setCategory('${escapeHtml(c).replace(/'/g,"\\'")}')">${escapeHtml(c)}</div>
  `).join('');
}
function setCategory(c){ activeCat=c; renderCategoryRow(); applyFilters(); }

function applyFilters(){
  searchTerm = (document.getElementById('searchBox').value||'').toLowerCase().trim();
  let list = allSalons;
  if(activeCat!=='All') list = list.filter(s=>s.category===activeCat);
  if(searchTerm){
    list = list.filter(s =>
      (s.name||'').toLowerCase().includes(searchTerm) ||
      (s.city||'').toLowerCase().includes(searchTerm) ||
      (s.address||'').toLowerCase().includes(searchTerm)
    );
  }
  renderList(list);
}

function renderList(list){
  const root = document.getElementById('listRoot');
  if(!list.length){
    root.innerHTML = `<div class="disc-empty"><div class="big">🔍</div>No salons found. Try a different search or category.</div>`;
    return;
  }
  root.innerHTML = list.map(s=>{
    const photo = s.settings && s.settings.photoUrl;
    const avatarHTML = photo
      ? `<div class="salon-avatar" style="background-image:url('${escapeHtml(photo)}');background-size:cover;background-position:center"></div>`
      : `<div class="salon-avatar">${escapeHtml(initials(s.name))}</div>`;
    const rating = avgRating(s);
    return `
    <div class="salon-card" onclick="openSalon('${s.id}')">
      ${avatarHTML}
      <div class="salon-info">
        <div class="salon-name">${escapeHtml(s.name)}</div>
        <div class="salon-cat">${escapeHtml(s.category||'Salon')}${rating?` · ⭐ ${rating.avg} (${rating.count})`:''}</div>
        <div class="salon-loc">📍 ${escapeHtml(s.city||'')}${s.address?' · '+escapeHtml(s.address):''}</div>
      </div>
      <div class="salon-arrow">›</div>
    </div>`;
  }).join('');
}

function openSalon(id){
  window.location.href = 'salon-detail.html?id=' + encodeURIComponent(id);
}

db.ref('salons').on('value', (snap)=>{
  const val = snap.val() || {};
  allSalons = Object.keys(val).map(id => ({ id, ...val[id] }));
  renderCategoryRow();
  applyFilters();
}, (err)=>{
  document.getElementById('listRoot').innerHTML = `<div class="disc-empty"><div class="big">⚠️</div>Could not load salons. Check your internet connection.</div>`;
});
</script>
</body>
</html>
